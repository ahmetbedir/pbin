<svg xmlns="http://www.w3.org/2000/svg" width="520" height="150" viewBox="0 0 520 150" fill="none" role="img" aria-label="pbin logo">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- icon tile -->
  <rect x="15" y="19" width="112" height="112" rx="26" fill="url(#g)"/>

  <!-- padlock shackle -->
  <path d="M56 68 v-10 a15 15 0 0 1 30 0 v10" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
  <!-- padlock body -->
  <rect x="48" y="66" width="46" height="42" rx="9" fill="#ffffff"/>
  <!-- keyhole -->
  <circle cx="71" cy="84" r="6" fill="#6366f1"/>
  <rect x="68" y="86" width="6" height="12" rx="3" fill="#6366f1"/>

  <!-- wordmark -->
  <text x="150" y="83" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="60" font-weight="800" fill="#6366f1">pbin</text>
  <!-- tagline -->
  <text x="152" y="113" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" fill="#94a3b8">encrypted pastes, from your terminal</text>
</svg>
